<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>國小演講題目查詢</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --panel: #fffdf8;
      --ink: #263126;
      --muted: #687062;
      --line: #ddd4c3;
      --brand: #2f765f;
      --brand-dark: #225947;
      --brand-soft: #dceee6;
      --blue: #356f9f;
      --blue-soft: #e5f0f8;
      --accent: #d9823b;
      --accent-soft: #faead9;
      --gray-soft: #f1eee7;
      --shadow: 0 16px 38px rgba(75, 61, 35, 0.12);
      --cat-color: var(--brand);
      --cat-soft: var(--brand-soft);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }

    body.login-locked {
      overflow: hidden;
    }

    body.login-locked main {
      display: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .login-screen {
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(47, 118, 95, 0.18), transparent 34%),
        linear-gradient(135deg, #f7f3ea 0%, #edf4ec 100%);
      display: none;
      min-height: 100svh;
      padding: 24px;
    }

    body.login-locked .login-screen {
      display: grid;
    }

    .login-card {
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin: 0 auto;
      max-width: 420px;
      padding: 28px;
      width: 100%;
    }

    .login-mark {
      align-items: center;
      background: var(--brand);
      border-radius: 8px;
      color: white;
      display: inline-flex;
      font-size: 22px;
      font-weight: 900;
      height: 46px;
      justify-content: center;
      margin-bottom: 18px;
      width: 46px;
    }

    .login-card h1 {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 8px;
    }

    .login-card p {
      color: var(--muted);
      margin: 0 0 20px;
    }

    .login-form {
      display: grid;
      gap: 12px;
    }

    .login-error {
      color: #9d3128;
      font-size: 14px;
      font-weight: 800;
      min-height: 20px;
    }

    .login-hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 14px;
    }

    .version-badge {
      background: var(--gray-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      display: inline-flex;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      margin-top: 12px;
      padding: 6px 9px;
    }

    main {
      margin: 0 auto;
      max-width: 1180px;
      padding: 18px 20px 44px;
    }

    .hero {
      align-items: end;
      display: flex;
      gap: 18px;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .hero-copy h1 {
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.18;
      margin: 0 0 8px;
    }

    .hero-copy p {
      color: var(--muted);
      font-size: 16px;
      margin: 0;
      max-width: 720px;
    }

    .hero-tools {
      align-items: flex-end;
      display: grid;
      gap: 10px;
      justify-items: end;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      min-width: 310px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: none;
      min-width: 132px;
      padding: 7px 12px;
    }

    .stat strong {
      display: inline;
      font-size: 18px;
      line-height: 1;
      margin-right: 4px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      background:
        linear-gradient(135deg, rgba(47, 118, 95, 0.08), rgba(255, 253, 248, 0.98) 45%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr) auto;
      margin-bottom: 14px;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 8;
    }

    .advanced-filters {
      display: grid;
      gap: 12px;
      grid-column: 1;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
    }

    .filter-primary-row {
      align-items: end;
      display: grid;
      gap: 12px;
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .keyword-field {
      min-width: 0;
    }

    .filter-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .quick-tag {
      background: rgba(47, 118, 95, 0.09);
      border: 1px solid rgba(47, 118, 95, 0.18);
      border-radius: 999px;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
      min-height: 0;
      padding: 5px 9px;
    }

    .quick-tag:hover {
      background: var(--brand-soft);
    }

    .subcategory-field.is-hidden {
      display: none;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      min-height: 44px;
      padding: 9px 11px;
      width: 100%;
    }

    input:focus,
    select:focus,
    button:focus {
      outline: 3px solid rgba(47, 118, 95, 0.22);
      outline-offset: 2px;
    }

    .actions {
      align-items: center;
      display: flex;
      gap: 8px;
      grid-column: 2;
      justify-content: flex-end;
      white-space: nowrap;
    }

    .filter-toggle {
      display: none;
    }

    button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
      min-height: 44px;
      padding: 10px 14px;
    }

    .primary {
      background: var(--brand);
      color: white;
      min-width: 112px;
    }

    .primary:hover {
      background: var(--brand-dark);
    }

    #searchButton {
      display: none;
    }

    #randomButton {
      background: var(--accent);
      box-shadow: 0 10px 20px rgba(217, 130, 59, 0.22);
      min-width: 160px;
    }

    #randomButton:hover {
      background: #be6c2c;
    }

    .ghost {
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .logout-button {
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--muted);
      min-height: 36px;
      padding: 7px 11px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      gap: 14px;
      grid-template-columns: minmax(210px, 260px) minmax(0, 1fr);
      align-items: start;
    }

    .category-panel,
    .results-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .category-panel {
      overflow: hidden;
      position: sticky;
      top: 96px;
    }

    .category-panel h2,
    .results-head h2 {
      font-size: 18px;
      margin: 0;
    }

    .category-head,
    .results-head {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .results-head {
      background: #ffffff;
    }

    .category-head {
      background: transparent;
      border-left: 0;
      border-right: 0;
      border-top: 0;
      color: var(--ink);
      min-height: 0;
      text-align: left;
      width: 100%;
    }

    .category-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .category-button {
      background: #ffffff;
      border: 1px solid var(--line);
      border-left: 5px solid var(--cat-color);
      border-radius: 8px;
      color: var(--ink);
      display: grid;
      gap: 2px;
      justify-items: start;
      min-height: 0;
      padding: 10px 12px;
      text-align: left;
      transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      width: 100%;
    }

    .category-button:hover {
      background: var(--cat-soft);
      border-color: var(--cat-color);
      box-shadow: 0 8px 18px rgba(75, 61, 35, 0.08);
      transform: translateY(-1px);
    }

    .category-button.active {
      background: var(--cat-color);
      border-color: var(--cat-color);
      color: white;
    }

    .category-button.active .category-meta {
      color: rgba(255, 255, 255, 0.78);
    }

    .category-name {
      font-size: 14px;
      font-weight: 800;
    }

    .category-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .count-pill {
      background: var(--accent-soft);
      border-radius: 999px;
      color: #8b4b1f;
      font-size: 13px;
      font-weight: 800;
      padding: 3px 9px;
      white-space: nowrap;
    }

    .results-head .count-pill {
      background: var(--brand);
      color: #ffffff;
      font-size: 16px;
      padding: 5px 12px;
    }

    .results {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .topic-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-left: 4px solid var(--cat-color);
      border-radius: 8px;
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
      padding: 12px 14px;
      box-shadow: 0 6px 16px rgba(75, 61, 35, 0.06);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .topic-card:hover {
      border-color: var(--cat-color);
      box-shadow: 0 10px 22px rgba(75, 61, 35, 0.08);
      transform: translateY(-1px);
    }

    .topic-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.45;
      margin: 0;
    }

    .topic-meta {
      align-items: center;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      font-size: 13px;
      gap: 7px;
    }

    .tag {
      background: #eef2ea;
      border-radius: 999px;
      color: #43503f;
      display: inline-flex;
      font-weight: 700;
      padding: 3px 8px;
    }

    .tag.year {
      background: var(--gray-soft);
      color: #625e55;
    }

    .tag.stage {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .tag.category {
      background: var(--cat-soft);
      color: var(--cat-color);
    }

    .tag.subcategory {
      background: #fff5e8;
      color: #9a5b1f;
    }

    .cat-01 {
      --cat-color: #2f765f;
      --cat-soft: #dceee6;
    }

    .cat-02 {
      --cat-color: #2f6f9f;
      --cat-soft: #e1eef8;
    }

    .cat-03 {
      --cat-color: #b45f3c;
      --cat-soft: #f7e5dc;
    }

    .cat-04 {
      --cat-color: #8b63b8;
      --cat-soft: #eee5f7;
    }

    .cat-05 {
      --cat-color: #c06d8b;
      --cat-soft: #f8e4ec;
    }

    .cat-06 {
      --cat-color: #4f8b3a;
      --cat-soft: #e4f1df;
    }

    .cat-07 {
      --cat-color: #4e6bc0;
      --cat-soft: #e5eafb;
    }

    .cat-08 {
      --cat-color: #c98224;
      --cat-soft: #faecd7;
    }

    .cat-09 {
      --cat-color: #7a6f2e;
      --cat-soft: #eeeacc;
    }

    .cat-10 {
      --cat-color: #32818b;
      --cat-soft: #dff1f2;
    }

    .cat-11 {
      --cat-color: #9c4b9d;
      --cat-soft: #f1e1f2;
    }

    .cat-12 {
      --cat-color: #60733c;
      --cat-soft: #e7eddc;
    }

    .empty,
    .loading,
    .error {
      color: var(--muted);
      padding: 34px 18px;
      text-align: center;
    }

    .error {
      color: #9d3128;
      font-weight: 700;
    }

    .tip-box {
      background: var(--accent-soft);
      border: 1px solid #f0cfaa;
      border-radius: 8px;
      color: #704019;
      margin-top: 14px;
      padding: 12px 14px;
    }

    .tip-box strong {
      display: block;
      margin-bottom: 4px;
    }

    .tip-box button {
      margin-top: 8px;
      min-height: 38px;
    }

    @media (max-width: 920px) {
      .layout,
      .controls {
        grid-template-columns: 1fr;
      }

      .keyword-field {
        grid-column: 1 / -1;
      }

      .controls {
        position: static;
      }

      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero-tools {
        justify-items: stretch;
        width: 100%;
      }

      .logout-button {
        justify-self: end;
      }

      .stats {
        justify-content: flex-start;
        min-width: 0;
        width: 100%;
      }

      .stat {
        flex: 1 1 140px;
      }

      .category-panel {
        position: static;
      }

      .actions {
        justify-content: stretch;
      }

      .actions button {
        flex: 1;
      }
    }

    @media (max-width: 560px) {
      .login-screen {
        align-items: start;
        padding: 16px;
      }

      .login-card {
        margin-top: 8vh;
        padding: 22px;
      }

      .login-card h1 {
        font-size: 24px;
      }

      .hero {
        align-items: center;
        background: transparent;
        flex-direction: row;
        gap: 8px;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .hero-copy {
        min-width: 0;
      }

      .hero-copy h1,
      .hero-copy p {
        display: none;
      }

      .hero .version-badge {
        margin-top: 0;
      }

      .hero-tools {
        flex: 0 0 auto;
        justify-items: end;
        width: auto;
      }

      .stats {
        display: none;
      }

      .logout-button {
        min-height: 34px;
        padding: 6px 10px;
        width: auto;
      }

      .stat {
        min-width: 0;
        padding: 7px 9px;
      }

      .stat strong {
        font-size: 17px;
      }

      main {
        padding: 8px 10px 28px;
      }

      .controls {
        gap: 10px;
        grid-template-columns: 1fr 1fr;
        padding: 12px;
        position: sticky;
        top: 0;
        z-index: 8;
      }

      .filter-primary-row {
        grid-column: 1 / -1;
        grid-template-columns: 1fr;
      }

      #randomButton {
        width: 100%;
      }

      .advanced-filters {
        display: none;
        gap: 10px;
        grid-column: 1 / -1;
        grid-template-columns: 1fr;
      }

      .controls.filters-open .advanced-filters {
        display: grid;
      }

      .filter-toggle {
        align-items: center;
        background: #ffffff;
        border: 1px solid var(--line);
        color: var(--brand-dark);
        display: inline-flex;
        justify-content: center;
        width: 100%;
      }

      .actions {
        display: grid;
        grid-column: 1 / -1;
        grid-template-columns: 1fr;
      }

      .actions #searchButton,
      .actions #resetButton {
        display: none;
      }

      .controls.filters-open .actions {
        grid-column: 1 / -1;
        grid-template-columns: 1fr;
      }

      .controls.filters-open .actions #resetButton {
        display: inline-flex;
      }

      input,
      select,
      button {
        min-height: 46px;
      }

      .category-head,
      .results-head {
        padding: 12px;
      }

      .category-head {
        cursor: pointer;
      }

      .category-list {
        display: none;
        grid-template-columns: 1fr;
        padding: 10px 12px 12px;
      }

      .category-panel.open .category-list {
        display: grid;
      }

      .topic-card {
        grid-template-columns: 1fr;
        padding: 11px 12px;
      }

      .topic-title {
        font-size: 17px;
      }

      .topic-meta {
        gap: 6px;
      }

      .tag {
        font-size: 12px;
      }
    }
  </style>
</head>
<body class="login-locked">
  <section class="login-screen" aria-labelledby="login-title">
    <div class="login-card">
      <div class="login-mark">講</div>
      <h1 id="login-title">國小演講題目查詢</h1>
      <p>請輸入班級共用密碼後開始查詢題目。</p>
      <form class="login-form" id="loginForm">
        <div class="field">
          <label for="loginPassword">密碼</label>
          <input id="loginPassword" type="password" inputmode="numeric" autocomplete="current-password" placeholder="請輸入密碼">
        </div>
        <button class="primary" type="submit">進入查詢</button>
        <div class="login-error" id="loginError" aria-live="polite"></div>
      </form>
      <div class="login-hint">請向老師索取班級共用密碼。</div>
      <div class="version-badge" data-version-label>版本載入中</div>
    </div>
  </section>

  <main>
    <section class="hero" aria-labelledby="page-title">
      <div class="hero-copy">
        <h1 id="page-title">幫學生找到剛剛好的練習題目</h1>
        <p>用年度、階段、分類和關鍵字快速篩選演講題目，也可以隨機抽題，適合課堂暖身、回家練習或賽前準備。</p>
        <span class="version-badge" data-version-label>版本載入中</span>
      </div>
      <div class="hero-tools">
        <button class="logout-button" id="logoutButton" type="button">登出</button>
        <div class="stats" aria-label="資料統計">
          <div class="stat">
            <strong id="totalTopics">0</strong>
            <span>題演講題目</span>
          </div>
          <div class="stat">
            <strong id="visibleTopics">0</strong>
            <span>目前符合條件</span>
          </div>
          <div class="stat">
            <strong id="yearCount">0</strong>
            <span>個年度</span>
          </div>
          <div class="stat">
            <strong id="categoryCount">0</strong>
            <span>個主題分類</span>
          </div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="查詢條件">
      <div class="filter-primary-row">
        <div class="field keyword-field">
          <label for="keyword">關鍵字搜尋</label>
          <input id="keyword" type="search" placeholder="輸入題目、分類或關鍵字，例如：環保、夢想、閱讀">
          <span class="filter-hint">輸入或變更條件後，題目會即時更新。</span>
          <div class="quick-tags" aria-label="常用關鍵字">
            <button class="quick-tag" type="button" data-keyword="夢想">夢想</button>
            <button class="quick-tag" type="button" data-keyword="環保">環保</button>
            <button class="quick-tag" type="button" data-keyword="閱讀">閱讀</button>
            <button class="quick-tag" type="button" data-keyword="朋友">朋友</button>
            <button class="quick-tag" type="button" data-keyword="上台">上台</button>
          </div>
        </div>
        <button class="primary" id="randomButton" type="button">隨機抽題</button>
      </div>
      <button class="filter-toggle" id="filterToggle" type="button" aria-expanded="false" aria-controls="advancedFilters">篩選條件</button>
      <div class="advanced-filters" id="advancedFilters">
        <div class="field">
          <label for="categoryFilter">主題分類</label>
          <select id="categoryFilter"></select>
        </div>
        <div class="field subcategory-field is-hidden" id="subcategoryField">
          <label for="subcategoryFilter">次分類</label>
          <select id="subcategoryFilter"></select>
        </div>
      </div>
      <div class="actions">
        <button class="primary" id="searchButton" type="button">開始篩選</button>
        <button class="ghost" id="resetButton" type="button">清除條件</button>
      </div>
    </section>

    <section class="layout">
      <aside class="category-panel" aria-label="主題分類列表">
        <button class="category-head" id="categoryToggle" type="button" aria-expanded="false" aria-controls="categoryList">
          <h2>主題分類</h2>
          <span class="count-pill" id="categorySummary">0 類</span>
        </button>
        <div class="category-list" id="categoryList"></div>
      </aside>

      <section class="results-panel" aria-live="polite">
        <div class="results-head">
          <h2>符合條件的題目</h2>
          <span class="count-pill" id="resultSummary">讀取中</span>
        </div>
        <div class="results" id="results">
          <div class="loading">正在讀取 Markdown 資料...</div>
        </div>
      </section>
    </section>
  </main>

  <script>

    function renderVersion() {
      document.querySelectorAll("[data-version-label]").forEach((el) => {
        el.textContent = `版本 ${APP_VERSION}`;
      });
      document.title = `國小演講題目查詢 ${APP_VERSION}`;

    function readAuthState() {
      try {
        return sessionStorage.getItem(AUTH_KEY) === "true";
      } catch (error) {
        return false;
      }
    }

    function writeAuthState(value) {
      try {
        if (value) {
          sessionStorage.setItem(AUTH_KEY, "true");
        } else {
          sessionStorage.removeItem(AUTH_KEY);
        }
      } catch (error) {
        // The page still works if browser storage is unavailable.
      }
    }

    function unlockApp() {
      document.body.classList.remove("login-locked");
      els.loginError.textContent = "";
      els.loginPassword.value = "";
    }

    function lockApp() {
      document.body.classList.add("login-locked");
      els.loginPassword.value = "";
      setTimeout(() => els.loginPassword.focus(), 0);
    }

    function isMobileViewport() {
      return window.matchMedia("(max-width: 560px)").matches;
    }

    function setFilterPanel(open) {
      els.controls.classList.toggle("filters-open", open);
      els.filterToggle.setAttribute("aria-expanded", String(open));
      els.filterToggle.textContent = open ? "收合篩選" : "篩選條件";
    }

    function setupLogin() {
      if (readAuthState()) {
        unlockApp();
      } else {
        lockApp();
      }

      els.loginForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (els.loginPassword.value === LOGIN_PASSWORD) {
          writeAuthState(true);
          unlockApp();
          return;
        }
        els.loginError.textContent = "密碼不正確，請再試一次。";

        writeAuthState(false);
        lockApp();
      });

    function parseMarkdownTable(markdown) {
      const rows = markdown
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.startsWith("|") && line.endsWith("|"))
        .map((line) => line.slice(1, -1).split("|").map((cell) => cell.trim().replaceAll("\\|", "|")));

      if (rows.length < 2) {
        return [];
      }

      const headers = rows[0];
      return rows.slice(2).map((row) => {
        return headers.reduce((record, header, index) => {
          record[header] = row[index] || "";
          return record;
        }, {});
      });
    }


    function topicCountByCategory(categoryName) {
      return state.topics.filter((topic) => topic.category === categoryName).length;
    }

    function subcategoryCountByCategory(categoryName) {
      return new Set(state.topics
        .filter((topic) => topic.category === categoryName && topic.subcategory)
        .map((topic) => topic.subcategoryCode || topic.subcategory)
      ).size;
    }

    function uniqueValues(key) {
      return [...new Set(state.topics.map((topic) => topic[key]).filter(Boolean))].sort();
    }

    function setOptions(select, values, allLabel) {
      select.innerHTML = "";
      select.append(new Option(allLabel, "all"));
      values.forEach((value) => select.append(new Option(value, value)));
    }

    function categoryClass(categoryName) {
      const match = String(categoryName).match(/^(\d{2})-/);
      return match ? `cat-${match[1]}` : "cat-01";
    }

    function buildCategoriesFromTopics() {
      const seen = new Map();
      state.topics.forEach((topic) => {
        if (!topic.category || seen.has(topic.category)) {
          return;
        }
        seen.set(topic.category, {
          id: topic.category.slice(0, 2),
          name: topic.category,
          description: `${subcategoryCountByCategory(topic.category)} 個次分類`
        });
      });
      return [...seen.values()].sort((a, b) => a.name.localeCompare(b.name, "zh-Hant"));
    }

    function subcategoriesForCategory(categoryName) {
      if (categoryName === "all") {
        return [];
      }

      const seen = new Map();
      state.topics
        .filter((topic) => topic.category === categoryName && topic.subcategory)
        .forEach((topic) => {
          const value = topic.subcategoryCode || topic.subcategory;
          if (!seen.has(value)) {
            seen.set(value, {
              value,
              label: topic.mainSubcategory || `${value}-${topic.subcategory}`
            });
          }
        });

      return [...seen.values()].sort((a, b) => a.value.localeCompare(b.value, "zh-Hant"));
    }

    function updateSubcategoryOptions(preferredValue = els.subcategoryFilter.value) {
      const categoryName = els.categoryFilter.value;
      const options = subcategoriesForCategory(categoryName);
      const shouldShow = categoryName !== "all" && options.length > 0;

      els.subcategoryField.classList.toggle("is-hidden", !shouldShow);
      els.subcategoryFilter.innerHTML = "";
      els.subcategoryFilter.append(new Option(shouldShow ? "全部次分類" : "請先選主分類", "all"));
      options.forEach((option) => els.subcategoryFilter.append(new Option(option.label, option.value)));

      const values = new Set(["all", ...options.map((option) => option.value)]);
      els.subcategoryFilter.value = values.has(preferredValue) ? preferredValue : "all";
    }

    function hydrateControls() {
      setOptions(els.categoryFilter, state.categories.map((category) => category.name), "全部分類");
      updateSubcategoryOptions("all");
    }

    function renderStats() {
      els.totalTopics.textContent = state.topics.length;
      els.visibleTopics.textContent = state.visible.length;
      els.yearCount.textContent = uniqueValues("year").length;
      els.categoryCount.textContent = state.categories.length;
      els.categorySummary.textContent = `${state.categories.length} 類`;
      els.resultsTitle.textContent = `符合條件的題目`;
      els.resultSummary.textContent = `共 ${state.visible.length} 題`;
    }

    function renderCategories() {
      const allClass = state.category === "all" ? " active" : "";
      const allButton = `
        <button class="category-button cat-01${allClass}" type="button" data-category="all">
          <span class="category-name">全部分類</span>
          <span class="category-meta">${state.topics.length} 題</span>
        </button>
      `;

      const categoryButtons = state.categories.map((category) => {
        const active = state.category === category.name ? " active" : "";
        const count = topicCountByCategory(category.name);
        const subCount = subcategoryCountByCategory(category.name);
        return `
          <button class="category-button ${categoryClass(category.name)}${active}" type="button" data-category="${escapeHtml(category.name)}" title="${escapeHtml(category.description)}">
            <span class="category-name">${escapeHtml(category.name)}</span>
            <span class="category-meta">${count} 題 / ${subCount} 次分類</span>
          </button>
        `;
      }).join("");

      els.categoryList.innerHTML = allButton + categoryButtons;
    }

    function topicMatches(topic) {
      const keyword = state.keyword.trim().toLowerCase();
      const haystack = `${topic.year} ${topic.stage} ${topic.title} ${topic.category} ${topic.subcategoryCode} ${topic.subcategory} ${topic.mainSubcategory}`.toLowerCase();
      const keywordMatch = keyword === "" || haystack.includes(keyword);
      const categoryMatch = state.category === "all" || topic.category === state.category;
      const subcategoryMatch = state.subcategory === "all" || topic.subcategoryCode === state.subcategory;
      return keywordMatch && categoryMatch && subcategoryMatch;
    }

    function renderResults() {
      if (state.visible.length === 0) {
        els.results.innerHTML = `
          <div class="empty">
            找不到符合條件的題目。可以試著改用其他關鍵字、主題分類，或清除篩選重新開始。
            <div class="tip-box">
              <strong>快速建議</strong>
              <button class="ghost" id="emptyResetButton" type="button">清除篩選</button>
            </div>
          </div>
        `;
        document.querySelector("#emptyResetButton")?.addEventListener("click", resetFilters);
        return;
      }

      els.results.innerHTML = state.visible.map((topic) => `
        <article class="topic-card ${categoryClass(topic.category)}">
          <h3 class="topic-title">${escapeHtml(topic.title)}</h3>
          <div class="topic-meta">
            <span class="tag year">${escapeHtml(topic.year)} 年</span>
            <span class="tag stage">${escapeHtml(topic.stage)}</span>
            <span class="tag category">${escapeHtml(topic.category)}</span>
            <span class="tag subcategory">${escapeHtml(topic.mainSubcategory || topic.subcategory)}</span>
          </div>
        </article>
      `).join("");
    }

    function applyFilters() {
      state.keyword = els.keyword.value;
      state.category = els.categoryFilter.value;
      updateSubcategoryOptions(els.subcategoryFilter.value);
      state.subcategory = els.subcategoryFilter.value;
      state.visible = state.topics.filter(topicMatches);
      renderStats();
      renderCategories();
      renderResults();
    }

    function resetFilters() {
      els.keyword.value = "";
      els.categoryFilter.value = "all";
      els.subcategoryFilter.value = "all";
      applyFilters();
      if (isMobileViewport()) {
        setFilterPanel(false);
      }
    }

    function pickRandomTopic() {
      const pool = state.visible.length > 0 ? state.visible : state.topics;
      if (pool.length === 0) {
        return;
      }

      const picked = pool[Math.floor(Math.random() * pool.length)];
      els.keyword.value = picked.title;
      els.categoryFilter.value = "all";
      els.subcategoryFilter.value = "all";
      applyFilters();
      document.querySelector(".results-panel").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function attachEvents() {
      [els.keyword, els.categoryFilter, els.subcategoryFilter].forEach((control) => {
        control.addEventListener("input", applyFilters);
      });

      els.searchButton.addEventListener("click", () => {
        applyFilters();
        if (isMobileViewport()) {
          setFilterPanel(false);
        }
      });
      els.filterToggle.addEventListener("click", () => {
        setFilterPanel(!els.controls.classList.contains("filters-open"));
      });
      els.resetButton.addEventListener("click", resetFilters);
      els.randomButton.addEventListener("click", pickRandomTopic);
      els.quickTags.addEventListener("click", (event) => {
        const button = event.target.closest("[data-keyword]");
        if (!button) {
          return;
        }
        els.keyword.value = button.dataset.keyword;
        applyFilters();
      });
      els.categoryToggle.addEventListener("click", () => {
        const isOpen = els.categoryPanel.classList.toggle("open");
        els.categoryToggle.setAttribute("aria-expanded", String(isOpen));
      });

      els.categoryList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-category]");
        if (!button) {
          return;
        }
        els.categoryFilter.value = button.dataset.category;
        els.subcategoryFilter.value = "all";
        applyFilters();
        if (isMobileViewport()) {
          els.categoryPanel.classList.remove("open");
          els.categoryToggle.setAttribute("aria-expanded", "false");
          setFilterPanel(false);
        }
      });
    }

    async function init() {
      renderVersion();
      setupLogin();

      try {
        const topicMarkdown = embeddedMarkdown.topics;

        state.topics = parseMarkdownTable(topicMarkdown).map((row) => ({
          id: row["項次"],
          year: row["年度"],
          stage: row["階段"],
          title: row["演講題目"],
          category: row["主題分類"],
          subcategoryCode: row["次分類編號"],
          subcategory: row["次分類"],
          mainSubcategory: row["主次分類"]
        }));

        state.categories = buildCategoriesFromTopics();

        hydrateControls();
        attachEvents();
        applyFilters();
      } catch (error) {
        els.resultSummary.textContent = "讀取失敗";
        els.results.innerHTML = `
          <div class="error">內嵌資料解析失敗，請確認 Markdown 表格格式。</div>
        `;
        console.error(error);
      }
    }

    init();
  </script>
</body>
</html>
